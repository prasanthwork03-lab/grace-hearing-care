# ==============================================================================
# Netlify Configuration for Grace Speech & Hearing Landing Page
# ==============================================================================

[build]
  command = "npm run build"
  publish = "dist"

# SPA Routing: Redirect all traffic to index.html for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# Cache headers for static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
